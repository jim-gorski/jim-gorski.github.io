name: Build & Deploy Nikola

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch (main)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Nikola
        run: |
          python -m venv .venv
          source .venv/bin/activate
          pip install --upgrade pip
          pip install nikola markdown

      - name: Build site
        run: |
          source .venv/bin/activate
          nikola build

      - name: Copy CNAME to output
        run: cp CNAME output/CNAME

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          branch: gh-pages
