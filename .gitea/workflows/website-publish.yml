name: Website publish

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: website-build
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify reviewed preview
        run: ./scripts/assert-preview-current.sh

      - name: Verify Hugo
        run: /usr/bin/hugo version

      - name: Build Hugo site
        run: /usr/bin/hugo --minify --destination output

      - name: Prepare GitHub Pages output
        run: |
          cp CNAME output/CNAME
          touch output/.nojekyll
          test -s output/index.html

      - name: Publish GitHub mirror and Pages
        env:
          GITHUB_PUBLISH_CREDENTIAL: ${{ secrets.GITHUB_PUBLISH_CREDENTIAL }}
        run: ./scripts/publish-github.sh
