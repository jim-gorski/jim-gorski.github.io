name: Website build

on:
  push:
    branches:
      - main
      - pipeline-repair
  workflow_dispatch:

jobs:
  build:
    runs-on: website-build
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Hugo
        run: hugo version

      - name: Build Hugo site
        run: hugo --minify --destination output

      - name: Prepare GitHub Pages output
        run: |
          cp CNAME output/CNAME
          touch output/.nojekyll
          test -s output/index.html

      - name: Publish preview
        run: ./scripts/deploy-preview.sh
