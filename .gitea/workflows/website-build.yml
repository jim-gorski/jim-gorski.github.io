name: Website build

on:
  push:
    branches:
      - main
      - pipeline-repair
  workflow_dispatch:

jobs:
  build:
    runs-on: website-build
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify Python
        run: |
          python3 -c 'import sys; assert sys.version_info[:2] == (3, 13), sys.version'
          python3 --version

      - name: Create build environment
        run: python3 -m venv .venv

      - name: Install pinned dependencies
        run: .venv/bin/python -m pip install --requirement requirements.txt

      - name: Build Nikola site
        run: .venv/bin/nikola build

      - name: Validate generated site
        run: .venv/bin/nikola check -l -f

      - name: Prepare GitHub Pages output
        run: |
          cp CNAME output/CNAME
          touch output/.nojekyll
          test -s output/index.html

      - name: Publish GitHub mirror and Pages
        if: gitea.ref == 'refs/heads/main'
        env:
          GITHUB_PUBLISH_CREDENTIAL: ${{ secrets.GITHUB_PUBLISH_CREDENTIAL }}
        run: ./scripts/publish-github.sh
