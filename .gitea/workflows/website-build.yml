name: Website build

on:
  push:
    branches:
      - main
      - pipeline-repair
  workflow_dispatch:

jobs:
  build:
    runs-on: website-build
    timeout-minutes: 15

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version
          cache: pip

      - name: Install pinned dependencies
        run: python -m pip install --requirement requirements.txt

      - name: Build Nikola site
        run: nikola build

      - name: Validate generated site
        run: nikola check -l -f

      - name: Prepare GitHub Pages output
        run: |
          cp CNAME output/CNAME
          touch output/.nojekyll
          test -s output/index.html
